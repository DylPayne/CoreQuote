services:
  postgres:
    image: postgres:17-alpine
    container_name: corequote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COREQUOTE_POSTGRES_DB:-corequote_dev}
      POSTGRES_USER: ${COREQUOTE_POSTGRES_USER:-corequote}
      POSTGRES_PASSWORD: ${COREQUOTE_POSTGRES_PASSWORD:-corequote_dev_password}
    ports:
      - "${COREQUOTE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - corequote-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${COREQUOTE_POSTGRES_USER:-corequote} -d ${COREQUOTE_POSTGRES_DB:-corequote_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  corequote-postgres-data:
